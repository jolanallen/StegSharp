name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary_name: StegSharp # Nom du binaire sans extension
          - os: windows-latest
            target: win-x64
            binary_name: StegSharp.exe # Nom avec extension

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore SteganoApp.slnx

    - name: Publish application
      shell: bash
      run: |
        dotnet publish Stegano.UI/Stegano.UI.csproj \
          --configuration Release \
          --runtime ${{ matrix.target }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:PublishReadyToRun=true \
          -o ./publish_output

    - name: Prepare Artifact
      shell: bash
      run: |
        mkdir -p ./to_upload
        # On renomme le binaire pour qu'il soit explicite (ex: SteganoApp-win-x64.exe)
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv ./publish_output/Stegano.UI.exe ./to_upload/SteganoApp-${{ matrix.target }}.exe
        else
          mv ./publish_output/Stegano.UI ./to_upload/SteganoApp-${{ matrix.target }}
          chmod +x ./to_upload/SteganoApp-${{ matrix.target }}
        fi

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.target }}
        path: ./to_upload/

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: release
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./final-binaries
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./final-binaries/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}